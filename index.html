<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEX V5 Team Scout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1e3a5f, #2d1b69); padding: 24px; text-align: center; border-bottom: 2px solid #3b82f6; }
  .header h1 { font-size: 28px; color: #fff; }
  .header p { color: #94a3b8; margin-top: 6px; font-size: 14px; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .search-box { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 24px; border: 1px solid #334155; }
  .search-box label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 6px; }
  .search-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .search-row input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 16px; outline: none; }
  .search-row input:focus { border-color: #3b82f6; }
  .search-row button { padding: 12px 28px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .search-row button:hover { background: #2563eb; }
  .search-row button:disabled { background: #475569; cursor: not-allowed; }

  .token-row { display: flex; gap: 12px; align-items: center; }
  .token-row input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 13px; }
  .token-hint { font-size: 12px; color: #64748b; margin-top: 4px; }
  .token-hint a { color: #60a5fa; }

  .loading { text-align: center; padding: 40px; color: #94a3b8; }
  .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { background: #991b1b33; border: 1px solid #991b1b; border-radius: 8px; padding: 16px; color: #fca5a5; margin-bottom: 16px; }

  .team-header { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .team-info h2 { font-size: 24px; color: #fff; }
  .team-info p { color: #94a3b8; margin-top: 4px; }
  .team-rating { text-align: center; }
  .team-rating .stars { font-size: 36px; color: #fbbf24; letter-spacing: 2px; }
  .team-rating .score { font-size: 14px; color: #94a3b8; margin-top: 4px; }

  .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
  .card h3 { font-size: 18px; color: #fff; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #334155; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat-item { background: #0f172a; border-radius: 8px; padding: 16px; text-align: center; }
  .stat-item .value { font-size: 28px; font-weight: 700; color: #3b82f6; }
  .stat-item .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
  th { color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase; }
  td { color: #e2e8f0; }
  tr:hover td { background: #1a2540; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .badge-world { background: #7c3aed33; color: #a78bfa; }
  .badge-sig { background: #db277733; color: #f472b6; }
  .badge-national { background: #0891b233; color: #22d3ee; }
  .badge-state { background: #059669aa; color: #6ee7b7; }
  .badge-regional { background: #d9770633; color: #fdba74; }
  .badge-other { background: #47556933; color: #94a3b8; }

  .strength-bar { display: inline-block; width: 60px; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; vertical-align: middle; margin-left: 6px; }
  .strength-fill { height: 100%; border-radius: 4px; }

  .rank-good { color: #4ade80; }
  .rank-ok { color: #fbbf24; }
  .rank-bad { color: #f87171; }

  .no-data { color: #64748b; font-style: italic; padding: 12px 0; }

  /* History cards */
  .history-section { margin-bottom: 24px; }
  .history-section h3 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; }
  .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .history-card { background: #1e293b; border-radius: 10px; padding: 16px; border: 1px solid #334155; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
  .history-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
  .history-card .hc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .history-card .hc-team { font-size: 18px; font-weight: 700; color: #fff; }
  .history-card .hc-stars { color: #fbbf24; font-size: 16px; letter-spacing: 1px; }
  .history-card .hc-name { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  .history-card .hc-stats { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: #64748b; }
  .history-card .hc-stats span { background: #0f172a; padding: 2px 8px; border-radius: 4px; }
  .history-card .hc-remove { float: right; background: none; border: none; color: #64748b; cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
  .history-card .hc-remove:hover { color: #f87171; }

  .back-btn { background: none; border: 1px solid #475569; color: #94a3b8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
  .back-btn:hover { border-color: #3b82f6; color: #fff; }

  @media (max-width: 600px) {
    .search-row { flex-direction: column; }
    .team-header { flex-direction: column; text-align: center; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .history-grid { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>VEX V5 Team Scout Tool</h1>
  <p>Enter a team number to look up season performance and rating</p>
</div>

<div class="container">
  <div class="search-box">
    <input type="hidden" id="apiToken" />
    <div>
      <label>Team Number (e.g. 1234A, 9999B)</label>
      <div class="search-row">
        <input type="text" id="teamNumber" placeholder="Enter team number..." onkeydown="if(event.key==='Enter') search()" />
        <button id="searchBtn" onclick="search()">Search</button>
      </div>
    </div>
  </div>

  <div id="history"></div>
  <div id="results"></div>
</div>

<script>
const API_BASE = 'https://www.robotevents.com/api/v2';
const V5RC_PROGRAM_ID = 1;
const EMBEDDED_TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJhdWQiOiIzIiwianRpIjoiMTJkNDgyNWY4YjM1ZmM0ZDFkZTk4OWVmZGVhYWY1ZmQ1ZWNiZDViMGYwNzI1MmI0NzVlODdlODg4ZDBlODk3MmI3NjgwNWYxMmJhMWI4MTAiLCJpYXQiOjE3NzMxNTE1ODUuODMyNjAwMSwibmJmIjoxNzczMTUxNTg1LjgzMjYwMiwiZXhwIjoyNzE5OTI2Mzg1LjgyMzM1MDksInN1YiI6Ijk5NTEzIiwic2NvcGVzIjpbXX0.J25lIQa-X9zCVuMVWxDvvEHHOn030BKb7bPytEzNIxtD4HYKLMUbN0H6DGzwxtCE-7DPB5Ve1EhXmVLFNSUDkNpEPF5i9wI0aynwD_iJ9npjh_hHIdZRcZU7FWQa5MmUi2EXpx4UV_bkX5KtVFF4cd75M1koRgE78uFB1_zg8Q4QeorQ0lbOmSY8nwOwhO85xhDCuXx9offbysmXUc4FeNismH2U9RfZQqQZ5LbqtGktWDWLJOlCvCURnA0YQQbv5rUSiabV42bQRv7QnS94O0WpmLZ-xnXgma-UsfXvrrnjYNx8Ypzo4ikIacKdOa-4ctdFQW2Jbof8HdLutlB4PxvcUH1lIl8enf4YatMnDDvSD-K6gR49JIzziqfLmPRobnanyxEKyYlV_BxxZRUQCPiQE3uhGBN7gJuXn9I82loGzufs2j6DYfNpup-dbYeXEJKRJdtOTWya3hyvCKT-IMTWf6_DzwmHYf_6ZMmUQpJhytM-cfDhnyOfqGmleYR7u2ih0YG4LY0ht-CScEqwdyg43EvuBSHiMKdjWPCsXEwpfPQ1xFVilXbWt_gCuLHtALy6S53nS0Zt6by35Tpr6JPORywOazfsa08kL4nVYvM39YunjqVLh1vVFHuaaQoL6d7tcEMmBAHWMspRzNL9daRzY5MLY-iYj718LwxT-00';
let currentSeasonId = null;
let searchHistory = JSON.parse(localStorage.getItem('v5scout_history') || '[]');

function getToken() {
  return EMBEDDED_TOKEN;
}

async function apiFetch(url, token) {
  const headers = { 'Accept': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`API Error ${res.status}: ${res.statusText}`);
  return res.json();
}

async function apiFetchAll(url, token) {
  let allData = [];
  let page = 1;
  while (true) {
    const sep = url.includes('?') ? '&' : '?';
    const data = await apiFetch(`${url}${sep}page=${page}&per_page=250`, token);
    allData = allData.concat(data.data || []);
    if (!data.meta || page >= data.meta.last_page) break;
    page++;
  }
  return allData;
}

async function getActiveSeason(token) {
  const data = await apiFetch(`${API_BASE}/seasons?program[]=${V5RC_PROGRAM_ID}&active=true`, token);
  if (data.data && data.data.length > 0) {
    const sorted = data.data.sort((a, b) => b.id - a.id);
    return sorted[0];
  }
  throw new Error('Active season not found');
}

// --- History ---
function saveHistory(entry) {
  searchHistory = searchHistory.filter(h => h.number !== entry.number);
  searchHistory.unshift(entry);
  if (searchHistory.length > 20) searchHistory = searchHistory.slice(0, 20);
  localStorage.setItem('v5scout_history', JSON.stringify(searchHistory));
  renderHistory();
}

function removeHistory(number) {
  searchHistory = searchHistory.filter(h => h.number !== number);
  localStorage.setItem('v5scout_history', JSON.stringify(searchHistory));
  renderHistory();
}

function renderHistory() {
  const div = document.getElementById('history');
  if (searchHistory.length === 0) { div.innerHTML = ''; return; }

  let html = '<div class="history-section"><h3>Recently Searched Teams</h3><div class="history-grid">';
  for (const h of searchHistory) {
    html += `
    <div class="history-card" onclick="quickSearch('${h.number}')">
      <button class="hc-remove" onclick="event.stopPropagation(); removeHistory('${h.number}')" title="Remove">&times;</button>
      <div class="hc-top">
        <span class="hc-team">${h.number}</span>
        <span class="hc-stars">${renderStars(h.rating)}</span>
      </div>
      <div class="hc-name">${h.name || 'Unknown'} — ${h.org || ''}</div>
      <div class="hc-stats">
        <span>Rating ${h.rating}/5.0</span>
        <span>${h.record || '-'}</span>
        <span>WS Rank ${h.wsRank || 'N/A'}</span>
        <span>${h.events || 0} events</span>
      </div>
    </div>`;
  }
  html += '</div></div>';
  div.innerHTML = html;
}

function quickSearch(number) {
  document.getElementById('teamNumber').value = number;
  search();
}

// --- Search ---
async function search() {
  const token = getToken();
  const teamNum = document.getElementById('teamNumber').value.trim().toUpperCase();
  const resultsDiv = document.getElementById('results');
  const btn = document.getElementById('searchBtn');

  if (!teamNum) { resultsDiv.innerHTML = '<div class="error">Please enter a team number</div>'; return; }

  btn.disabled = true;
  resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px;">Loading...</p></div>';

  try {
    if (!currentSeasonId) {
      const season = await getActiveSeason(token);
      currentSeasonId = season.id;
    }

    const teamData = await apiFetch(`${API_BASE}/teams?number[]=${encodeURIComponent(teamNum)}&program[]=${V5RC_PROGRAM_ID}`, token);
    if (!teamData.data || teamData.data.length === 0) {
      resultsDiv.innerHTML = '<div class="error">Team not found. Please check the team number.</div>';
      btn.disabled = false;
      return;
    }
    const team = teamData.data[0];
    const teamId = team.id;

    const [events, rankings, skills, awards, worldSkillsRaw] = await Promise.all([
      apiFetchAll(`${API_BASE}/teams/${teamId}/events?season[]=${currentSeasonId}`, token),
      apiFetchAll(`${API_BASE}/teams/${teamId}/rankings?season[]=${currentSeasonId}`, token),
      apiFetchAll(`${API_BASE}/teams/${teamId}/skills?season[]=${currentSeasonId}`, token),
      apiFetchAll(`${API_BASE}/teams/${teamId}/awards?season[]=${currentSeasonId}`, token),
      fetchWorldSkills(currentSeasonId, teamNum)
    ]);

    renderResults(team, events, rankings, skills, awards, worldSkillsRaw);
  } catch (err) {
    resultsDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
    console.error(err);
  }
  btn.disabled = false;
}

async function fetchWorldSkills(seasonId, teamNum) {
  try {
    const res = await fetch(`https://www.robotevents.com/api/seasons/${seasonId}/skills`);
    if (!res.ok) { console.warn('World skills API returned', res.status); return null; }
    const data = await res.json();
    if (!Array.isArray(data)) { console.warn('World skills API returned non-array'); return null; }
    const entry = data.find(e => e.team && e.team.team === teamNum);
    if (!entry) { console.warn('Team', teamNum, 'not found in world skills (total:', data.length, ')'); return null; }
    return { entry, total: data.length };
  } catch (e) { console.warn('World skills fetch failed:', e); return null; }
}

function getLevelBadge(level) {
  const map = {
    'World': ['badge-world', 'World'],
    'Signature': ['badge-sig', 'Signature'],
    'National': ['badge-national', 'National'],
    'State': ['badge-state', 'State'],
    'Regional': ['badge-regional', 'Regional'],
  };
  const [cls, label] = map[level] || ['badge-other', level || 'Other'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function getEventStrength(level, teamCount) {
  const levelScore = { 'World': 5, 'Signature': 4.5, 'National': 3.5, 'State': 3, 'Regional': 2.5 };
  let base = levelScore[level] || 2;
  if (teamCount >= 48) base = Math.min(5, base + 0.5);
  else if (teamCount >= 32) base = Math.min(5, base + 0.25);
  else if (teamCount < 16) base = Math.max(1, base - 0.5);
  return Math.round(base * 10) / 10;
}

function calcTeamRating(rankings, skills, events, worldSkills, awards) {
  let score = 0;
  let factors = 0;

  if (rankings.length > 0) {
    const percentiles = rankings.map(r => {
      const totalTeams = r.event ? (r.event.teamCount || 30) : 30;
      return 1 - (r.rank - 1) / Math.max(totalTeams - 1, 1);
    });
    const avgPercentile = percentiles.reduce((a, b) => a + b, 0) / percentiles.length;
    score += avgPercentile * 5 * 3;
    factors += 3;
  }

  const totalWins = rankings.reduce((s, r) => s + (r.wins || 0), 0);
  const totalLosses = rankings.reduce((s, r) => s + (r.losses || 0), 0);
  const totalTies = rankings.reduce((s, r) => s + (r.ties || 0), 0);
  const totalMatches = totalWins + totalLosses + totalTies;
  if (totalMatches > 0) {
    const winRate = (totalWins + totalTies * 0.5) / totalMatches;
    score += winRate * 5 * 2;
    factors += 2;
  }

  if (worldSkills && worldSkills.entry && worldSkills.entry.rank) {
    const rank = worldSkills.entry.rank;
    const total = worldSkills.total;
    const percentile = 1 - (rank - 1) / Math.max(total - 1, 1);
    score += percentile * 5 * 2;
    factors += 2;
  }

  if (events.length > 0) {
    const strengths = events.map(e => getEventStrength(e.level, 30));
    const avgStrength = strengths.reduce((a, b) => a + b, 0) / strengths.length;
    score += avgStrength * 1;
    factors += 1;
  }

  if (awards.length > 0) {
    const awardBonus = Math.min(awards.length * 0.5, 5);
    score += awardBonus * 1;
    factors += 1;
  }

  if (factors === 0) return 0;
  return Math.round((score / factors) * 10) / 10;
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.4;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '☆';
  const empty = 5 - full - (half ? 1 : 0);
  for (let i = 0; i < empty; i++) s += '☆';
  return s;
}

function getEventDate(evt) {
  return evt?.start ? new Date(evt.start) : new Date(0);
}

function renderResults(team, events, rankings, skills, awards, worldSkills) {
  const resultsDiv = document.getElementById('results');

  const rating = calcTeamRating(rankings, skills, events, worldSkills, awards);

  const driverScores = skills.filter(s => s.type === 'driver').map(s => s.score);
  const progScores = skills.filter(s => s.type === 'programming').map(s => s.score);
  const bestDriver = driverScores.length > 0 ? Math.max(...driverScores) : null;
  const bestProg = progScores.length > 0 ? Math.max(...progScores) : null;

  const totalWins = rankings.reduce((s, r) => s + (r.wins || 0), 0);
  const totalLosses = rankings.reduce((s, r) => s + (r.losses || 0), 0);
  const totalTies = rankings.reduce((s, r) => s + (r.ties || 0), 0);

  const wsRank = worldSkills?.entry?.rank || 'N/A';
  const wsTotal = worldSkills?.total || '?';

  // Save to history
  saveHistory({
    number: team.number,
    name: team.team_name || 'Unknown',
    org: team.organization || '',
    rating,
    record: `${totalWins}W-${totalLosses}L-${totalTies}T`,
    wsRank: wsRank,
    events: events.length
  });

  // Build event date lookup
  const eventDateMap = new Map();
  events.forEach(e => eventDateMap.set(e.id, e));

  let html = '';

  // Back button
  html += `<button class="back-btn" onclick="showHome()">← Back to Search</button>`;

  // Team Header
  html += `
  <div class="team-header">
    <div class="team-info">
      <h2>${team.number} — ${team.team_name || 'Unknown'}</h2>
      <p>${team.organization || ''} | ${team.location?.city || ''}, ${team.location?.region || ''}, ${team.location?.country || ''}</p>
    </div>
    <div class="team-rating">
      <div class="stars">${renderStars(rating)}</div>
      <div class="score">Overall Rating ${rating} / 5.0</div>
    </div>
  </div>`;

  // Stats Overview
  html += `
  <div class="card">
    <h3>Season Overview</h3>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="value">${events.length}</div>
        <div class="label">Events Attended</div>
      </div>
      <div class="stat-item">
        <div class="value">${totalWins}W-${totalLosses}L-${totalTies}T</div>
        <div class="label">Win-Loss-Tie</div>
      </div>
      <div class="stat-item">
        <div class="value">${wsRank}</div>
        <div class="label">Skills World Rank / ${wsTotal}</div>
      </div>
      <div class="stat-item">
        <div class="value">${bestDriver ?? 'N/A'}</div>
        <div class="label">Driver High Score</div>
      </div>
      <div class="stat-item">
        <div class="value">${bestProg ?? 'N/A'}</div>
        <div class="label">Programming High Score</div>
      </div>
    </div>
  </div>`;

  // Event Rankings - sorted by event date descending
  html += `
  <div class="card">
    <h3>Event Results</h3>`;
  if (rankings.length > 0) {
    const eventMap = new Map();
    rankings.forEach(r => {
      const eid = r.event?.id || 0;
      if (!eventMap.has(eid)) {
        eventMap.set(eid, { event: r.event, rankings: [] });
      }
      eventMap.get(eid).rankings.push(r);
    });

    // Sort events by date descending
    const sortedEvents = [...eventMap.entries()].sort((a, b) => {
      const evtA = eventDateMap.get(a[0]) || a[1].event || {};
      const evtB = eventDateMap.get(b[0]) || b[1].event || {};
      return getEventDate(evtB) - getEventDate(evtA);
    });

    html += `<table>
      <thead><tr><th>Event Name</th><th>Date</th><th>Level</th><th>Rank</th><th>Record</th><th>WP/AP/SP</th><th>Strength</th></tr></thead>
      <tbody>`;

    for (const [eid, data] of sortedEvents) {
      const evt = eventDateMap.get(eid) || data.event || {};
      const level = evt.level || 'Other';
      const dateStr = evt.start ? new Date(evt.start).toLocaleDateString() : '-';
      for (const r of data.rankings) {
        const strength = getEventStrength(level, 30);
        const strengthPct = (strength / 5) * 100;
        const strengthColor = strength >= 4 ? '#f472b6' : strength >= 3 ? '#fbbf24' : '#60a5fa';
        const rankClass = r.rank <= 3 ? 'rank-good' : r.rank <= 10 ? 'rank-ok' : 'rank-bad';
        html += `<tr>
          <td>${evt.name || data.event?.name || 'Unknown'}</td>
          <td>${dateStr}</td>
          <td>${getLevelBadge(level)}</td>
          <td class="${rankClass}"><strong>#${r.rank}</strong></td>
          <td>${r.wins || 0}W-${r.losses || 0}L-${r.ties || 0}T</td>
          <td>${r.wp ?? '-'} / ${r.ap ?? '-'} / ${r.sp ?? '-'}</td>
          <td>${strength}
            <div class="strength-bar"><div class="strength-fill" style="width:${strengthPct}%;background:${strengthColor}"></div></div>
          </td>
        </tr>`;
      }
    }
    html += '</tbody></table>';
  } else {
    html += '<p class="no-data">No event ranking data this season</p>';
  }
  html += '</div>';

  // Skills Runs - sorted by event date descending, then by type
  html += `
  <div class="card">
    <h3>Skills Runs</h3>`;
  if (skills.length > 0) {
    const sortedSkills = [...skills].sort((a, b) => {
      const dateA = getEventDate(eventDateMap.get(a.event?.id) || a.event);
      const dateB = getEventDate(eventDateMap.get(b.event?.id) || b.event);
      if (dateB - dateA !== 0) return dateB - dateA;
      // Same event: driver first, then programming
      if (a.type !== b.type) return a.type === 'driver' ? -1 : 1;
      return b.score - a.score;
    });

    html += `<table>
      <thead><tr><th>Event</th><th>Date</th><th>Type</th><th>Score</th><th>Rank</th><th>Attempts</th></tr></thead>
      <tbody>`;
    for (const s of sortedSkills) {
      const evt = eventDateMap.get(s.event?.id) || s.event || {};
      const dateStr = evt.start ? new Date(evt.start).toLocaleDateString() : '-';
      const typeLabel = s.type === 'driver' ? 'Driver' : 'Programming';
      html += `<tr>
        <td>${evt.name || s.event?.name || 'Unknown'}</td>
        <td>${dateStr}</td>
        <td>${typeLabel}</td>
        <td><strong>${s.score}</strong></td>
        <td>#${s.rank ?? '-'}</td>
        <td>${s.attempts ?? '-'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
  } else {
    html += '<p class="no-data">No skills runs recorded this season</p>';
  }
  html += '</div>';

  // Awards - sorted by event date descending
  if (awards.length > 0) {
    const sortedAwards = [...awards].sort((a, b) => {
      const da = getEventDate(eventDateMap.get(a.event?.id) || a.event);
      const db = getEventDate(eventDateMap.get(b.event?.id) || b.event);
      return db - da;
    });
    html += `
    <div class="card">
      <h3>Awards</h3>
      <table>
        <thead><tr><th>Event</th><th>Date</th><th>Award</th></tr></thead>
        <tbody>`;
    for (const a of sortedAwards) {
      const evt = eventDateMap.get(a.event?.id) || a.event || {};
      const dateStr = evt.start ? new Date(evt.start).toLocaleDateString() : '-';
      html += `<tr>
        <td>${evt.name || a.event?.name || 'Unknown'}</td>
        <td>${dateStr}</td>
        <td>${a.title || a.name || 'Unknown Award'}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  // Rating Breakdown
  html += `
  <div class="card">
    <h3>Rating Breakdown</h3>
    <p style="color:#94a3b8; line-height:1.8; font-size:14px;">
      Overall rating is calculated based on the following factors (max 5.0):<br>
      • <strong>Event Rank Percentile</strong> (weight 30%): Average ranking position across all events<br>
      • <strong>Win Rate</strong> (weight 20%): Overall win/loss ratio<br>
      • <strong>Skills World Ranking</strong> (weight 20%): Percentile among all teams globally<br>
      • <strong>Event Strength</strong> (weight 10%): Level of events attended (World > Signature > State ...)<br>
      • <strong>Awards</strong> (weight 10%): Number of awards received this season<br>
      <br>
      <strong>Event Strength Scores:</strong> World=5 / Signature=4.5 / National=3.5 / State=3 / Regional=2.5 (bonus for large team counts)
    </p>
  </div>`;

  resultsDiv.innerHTML = html;
}

function showHome() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('teamNumber').value = '';
  document.getElementById('teamNumber').focus();
}

// Init: render history on load
renderHistory();

</script>
